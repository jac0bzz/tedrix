<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sistema Desconectado | Tedrix</title>
    <link rel="icon" type="image/x-icon" href="assets/Icono-Tedrix.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #05070a;
            font-family: 'Inter', sans-serif;
        }

        /* Fondo de cuadrícula tecnológica */
        .tech-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            z-index: 1;
        }

        .error-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .error-code {
            font-family: 'Space Mono', monospace;
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: white;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
            position: relative;
            display: inline-block;
        }

        /* Pequeña animación de parpadeo */
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0; left: 0;
            color: var(--primary-teal);
            filter: blur(8px);
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .error-title {
            color: white;
            font-size: 2rem;
            margin: 20px 0 10px 0;
            letter-spacing: -1px;
        }

        .error-message {
            color: #888;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--primary-teal);
            color: white;
            padding: 15px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        .back-home-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.4);
            background: #0ea5e9;
        }

        .glitch-line {
            height: 2px;
            width: 50px;
            background: var(--primary-teal);
            margin: 20px auto;
            box-shadow: 0 0 10px var(--primary-teal);
        }
    </style>
</head>
<body>
    <div class="tech-grid"></div>
    <div class="global-background-glow"></div>

    <div class="error-wrapper">
        <div class="error-card fade-in visible">
            <h1 class="error-code">404</h1>
            <div class="glitch-line"></div>
            <h2 class="error-title">ERROR DE ACCESO</h2>
            <p class="error-message">
                Lo sentimos, la terminal solicitada no responde. Es posible que el recurso haya sido movido o eliminado de la red de Tedrix.
            </p>
            
            <a href="index.html" class="back-home-btn">
                <i class="fa-solid fa-house-signal"></i> Reiniciar Terminal
            </a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
